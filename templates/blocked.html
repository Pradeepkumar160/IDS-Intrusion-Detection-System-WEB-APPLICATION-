<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>403 — Blocked by IDS</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #0a0e1a; color: #e0e6f0; min-height:100vh; display:flex; align-items:center; justify-content:center; }
.box { text-align:center; padding: 3rem; }
.icon { font-size: 4rem; margin-bottom: 1rem; }
h1 { font-size: 3rem; color: #ff4757; font-weight: 700; margin-bottom: 0.5rem; }
p { color: #8899aa; margin-bottom: 2rem; font-size: 1.1rem; }
.badge { display:inline-block; background: rgba(255,71,87,0.15); color: #ff4757; border: 1px solid rgba(255,71,87,0.3); border-radius: 8px; padding: 10px 24px; font-weight: 600; font-size: 14px; margin-bottom: 2rem; }
a { color: #4da6ff; text-decoration: none; font-size: 14px; }
a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="box">
  <div class="icon">🚫</div>
  <h1>403 Blocked</h1>
  <div class="badge">⚡ IDS — Intrusion Detected & Blocked</div>
  <p>Your request was identified as malicious and blocked by the<br>Real-Time Intrusion Detection System.</p>
  <p style="font-size:12px;color:#556677;">Your IP has been logged and flagged for review.</p>
  <br>
  <a href="/dashboard">View IDS Dashboard →</a>
</div>

</html>
